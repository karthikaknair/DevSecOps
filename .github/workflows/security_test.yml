name: Security Scanon

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  secret_scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          pip install detect-secrets
          sudo apt-get install -y jq  

      - name: Run Full Scan (No Secrets in Logs)
        run: |
          detect-secrets scan --all-files > scan_results.json
          RESULT_COUNT=$(jq '[.results[] | length] | add // 0' scan_results.json)

          if [ "$RESULT_COUNT" -gt 0 ]; then
            echo "Error!! Secrets detected in the repository!"
            echo "-------------------------------------------------------"
            echo "The following files contain potential secrets:"
            
            # This jq command extracts ONLY the file paths and line numbers
            jq -r '
              .results
              | to_entries[]
              | .key as $file
              | .value[]
              | "File: \($file) | Line: \(.line_number) | Type: \(.type)"
            ' scan_results.json
            echo "-------------------------------------------------------"
            echo "Action: Rotate these secrets and add them to a .baseline file."
            rm -f scan_results.json
            exit 1
          else
            echo "No secrets found in the full repository scan."
          fi
  sbom_scan:
    name: SBOM (Syft) + Vulnerability Scan (Grype)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Make Node deps visible to Syft
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps (recommended for accurate SBOM)
        run: |
          # Prefer npm ci if package-lock.json exists, otherwise fallback
          if [ -f package-lock.json ]; then
            npm ci --omit=dev --no-audit --no-fund
          else
            npm install --omit=dev --no-audit --no-fund
          fi

      # Make Python deps visible to Syft (skip automatically if no requirements.txt)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps (if present)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found - skipping Python install"
          fi

      # 1) Generate SBOM for the whole repo workspace
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          path: .

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

      # 2) Scan the SBOM with Grype and fail build on High/Critical
      - name: Scan SBOM (Grype)
        uses: anchore/scan-action@v6
        with:
          sbom: sbom.spdx.json
          fail-build: true
          severity-cutoff: high
          output-format: json
          output-file: grype-results.json

      - name: Upload Grype report
        uses: actions/upload-artifact@v4
        with:
          name: grype-results
          path: grype-results.json
      - name: Summarize Grype findings
        if: always()
        run: |
          if [ -f grype-results.json ]; then
            echo "Top vulnerability findings:"
            jq -r '
              .matches[]
              | "\(.artifact.name)@\(.artifact.version) | \(.vulnerability.id) | \(.vulnerability.severity)"
            ' grype-results.json | sort | uniq | head -50
          fi
            # 3) Trivy SCA scan on the repo filesystem
      - name: Run Trivy SCA scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: json
          output: trivy-results.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

      - name: Summarize Trivy findings
        if: always()
        run: |
          if [ -f trivy-results.json ]; then
            echo "Top Trivy vulnerability findings:"
            jq -r '
              .Results[]? 
              | .Vulnerabilities[]? 
              | "\(.PkgName)@\(.InstalledVersion) | \(.VulnerabilityID) | \(.Severity)"
            ' trivy-results.json | sort | uniq | head -50
          fi
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/secrets
            p/javascript
            p/owasp-top-ten
            p/python 
            custom_rules.yaml
          # Optional: Add lines to fail the build based on severity (e.g., errorOn: 'error')

  zap_scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'  
          
      - name: Install deps
        run: npm install --omit=dev --no-audit --no-fund

      - name: Start vulnerable server (:3000)
        run: |
          nohup npm start >/dev/null 2>&1 &  # background
          # wait for readiness
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then exit 0; fi
            sleep 0.5
          done
          echo "Server didn't start in time" >&2
          exit 1

      - name: ZAP Baseline (stable name, no issues)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://127.0.0.1:3000"
          cmd_options: "-a -m 5"
          allow_issue_writing: false
          artifact_name: "zapreport" 
          
            

      
